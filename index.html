<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUBI PH Cash Flow Tracker</title>
<meta name="theme-color" content="#1e3a8a"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--cf-primary:#1e3a8a;
--cf-accent:#3b82f6;
--cf-soft:#eff6ff;
--cf-soft-2:#dbeafe;
--cf-border:#bfdbfe;
--cf-bg:#f4f8fb;
--income:#16a34a;
--expense:#dc2626;
--savings:#2563eb;
--shadow:0 8px 22px rgba(0,0,0,0.05);
}

body{
font-family:Arial;
background:var(--cf-bg);
padding:16px;
}

.container{max-width:1100px;margin:auto;}

.card,.section{
background:#fff;
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:var(--shadow);
}

h2{color:var(--cf-primary);margin-bottom:10px;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:16px;
}

.dash-card{padding:14px;border-radius:14px;background:#fff;border:1px solid #eee;}
.value{font-size:22px;font-weight:bold;}
.income-color{color:var(--income);}
.expense-color{color:var(--expense);}
.savings-color{color:var(--savings);}

.form-split{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

input,select,button{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:var(--cf-primary);
color:#fff;
border:none;
cursor:pointer;
}

.table-wrap{overflow:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;}

.chart-box{height:350px;}

.comparison-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.comparison-card{
padding:14px;
border-radius:14px;
background:#fff;
border:1px solid #eee;
}

.filter-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:10px;
}

@media(max-width:768px){
.dashboard,.form-split,.form-grid,.comparison-grid,.filter-grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>
<div class="container">

<!-- DASHBOARD -->
<div class="dashboard">
<div class="dash-card">
<h3>Total Income</h3>
<div class="value income-color" id="totalIncome">₱0</div>
</div>

<div class="dash-card">
<h3>Total Expenses</h3>
<div class="value expense-color" id="totalExpenses">₱0</div>
</div>

<div class="dash-card">
<h3>Balance</h3>
<div class="value" id="balance">₱0</div>
</div>

<div class="dash-card">
<h3>Savings</h3>
<div class="value savings-color" id="totalSavings">₱0</div>
</div>
</div>

<!-- FORMS -->
<div class="form-split">

<div class="section">
<h2>Add Salary</h2>
<div class="form-grid">
<input type="date" id="salaryFrom">
<input type="date" id="salaryTo">
<input type="number" id="salaryAmount" placeholder="Amount">
<button onclick="addSalary()">Add</button>
</div>
</div>

<div class="section">
<h2>Add Expense</h2>
<div class="form-grid">
<input type="date" id="expenseDate">
<select id="expenseCategory">
<option>Foods</option>
<option>Meds</option>
<option>Transpo</option>
<option>Family Support</option>
<option>Wants</option>
<option>Savings</option>
<option>Bills - Electric</option>
<option>Bills - Water</option>
<option>Bills - Internet</option>
<option>Bills - Plans</option>
</select>
<input type="number" id="expenseAmount">
<button onclick="addExpense()">Add</button>
</div>
</div>

</div>

<!-- COMPARISON -->
<div class="section">
<h2>Income vs Savings</h2>

<div class="comparison-grid">
<div class="comparison-card">
<h3>Total Income</h3>
<div class="value income-color" id="compareIncome">₱0</div>
</div>

<div class="comparison-card">
<h3>Total Savings</h3>
<div class="value savings-color" id="compareSavings">₱0</div>
</div>
</div>

<div class="comparison-grid">
<div class="comparison-card">
<h3>Savings %</h3>
<div class="value savings-color" id="savingsPercent">0%</div>
</div>

<div class="comparison-card">
<h3>Expenses %</h3>
<div class="value expense-color" id="expensesPercent">0%</div>
</div>
</div>

</div>

<!-- RECORDS -->
<div class="section">
<h2>Records</h2>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th></th>
</tr>
</thead>
<tbody id="recordTable"></tbody>
</table>
</div>

<!-- FILTERS BELOW -->
<div class="filter-grid">
<input id="searchInput" placeholder="Search..." oninput="render()">
<input type="month" id="monthFilter" oninput="render()">
<button onclick="clearFilters()">Clear</button>
</div>

</div>

<!-- CHART -->
<div class="section">
<h2>Expense Breakdown</h2>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<script>
let records=JSON.parse(localStorage.getItem('records'))||[];
let chart;

function save(){localStorage.setItem('records',JSON.stringify(records));}

function addSalary(){
let from=salaryFrom.value,to=salaryTo.value,amt=+salaryAmount.value;
if(!from||!to||!amt)return alert("Fill all");
records.push({id:Date.now(),date:from,type:"Income",category:"Salary",amount:amt});
save();render();
}

function addExpense(){
let d=expenseDate.value,c=expenseCategory.value,a=+expenseAmount.value;
if(!d||!a)return alert("Fill all");
records.push({id:Date.now(),date:d,type:"Expense",category:c,amount:a});
save();render();
}

function deleteRec(id){
records=records.filter(r=>r.id!=id);
save();render();
}

function clearFilters(){
searchInput.value="";
monthFilter.value="";
render();
}

function render(){
let search=searchInput.value.toLowerCase();
let month=monthFilter.value;

let data=records.filter(r=>{
let ok=JSON.stringify(r).toLowerCase().includes(search);
let m=!month||r.date.startsWith(month);
return ok&&m;
});

let income=0,expense=0,savings=0,cat={};

data.forEach(r=>{
if(r.type=="Income")income+=r.amount;
else{
expense+=r.amount;
if(r.category=="Savings")savings+=r.amount;
cat[r.category]=(cat[r.category]||0)+r.amount;
}
});

balance.innerText="₱"+(income-expense);
totalIncome.innerText="₱"+income;
totalExpenses.innerText="₱"+expense;
totalSavings.innerText="₱"+savings;

compareIncome.innerText="₱"+income;
compareSavings.innerText="₱"+savings;

let sp=income?((savings/income)*100):0;
let ep=income?((expense/income)*100):0;

savingsPercent.innerText=sp.toFixed(1)+"%";
expensesPercent.innerText=ep.toFixed(1)+"%";

recordTable.innerHTML="";
data.reverse().forEach(r=>{
recordTable.innerHTML+=`
<tr>
<td>${r.date}</td>
<td>${r.type}</td>
<td>${r.category}</td>
<td>₱${r.amount}</td>
<td><button onclick="deleteRec(${r.id})">X</button></td>
</tr>`;
});

updateChart(cat);
}

function updateChart(cat){
let ctx=document.getElementById('chart');

if(chart)chart.destroy();

chart=new Chart(ctx,{
type:'pie',
data:{
labels:Object.keys(cat),
datasets:[{data:Object.values(cat)}]
}
});
}

render();
</script>
</body>
</html>
